name: CI/CD — EventService

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/event-service

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI — Build, Test & JaCoCo (todas las ramas)
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build, test & verificar cobertura JaCoCo (≥80%)
        run: chmod +x mvnw && ./mvnw -B verify

      - name: Publicar reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore

      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Build imagen Docker y push a GHCR (solo main)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Deploy al servidor remoto vía SSH (solo main)
  #
  # Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
  #   DEPLOY_HOST        IP o dominio del servidor
  #   DEPLOY_USER        Usuario SSH (ej. ubuntu)
  #   DEPLOY_SSH_KEY     Clave privada SSH (sin passphrase)
  #   DEPLOY_DIR         Ruta en el servidor (ej. /opt/alpha/event-service)
  #   MONGO_URI          URI de MongoDB (ej. mongodb://mongo:27017/eventsdb)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Deploy vía SSH
        if: ${{ env.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Autenticarse en GHCR desde el servidor
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Detener y eliminar el contenedor anterior si existe
            docker stop event-service 2>/dev/null || true
            docker rm   event-service 2>/dev/null || true

            # Pull de la nueva imagen y arranque
            docker pull ${{ env.IMAGE_NAME }}:latest

            docker run -d \
              --name event-service \
              --restart unless-stopped \
              -p 8081:8081 \
              -e SPRING_MONGODB_URI="${{ secrets.MONGO_URI }}" \
              -e SPRING_APPLICATION_NAME=EventService \
              ${{ env.IMAGE_NAME }}:latest

            # Limpieza de imágenes antiguas
            docker image prune -f

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Deploy a Azure App Service vía ACR + OIDC (solo main)
  #
  # Depende de `ci`: solo se ejecuta si build + tests + JaCoCo (≥80%) pasan.
  # Autenticación sin secretos de admin: OIDC (federated credential) + la
  # identidad administrada de la Web App con rol AcrPull hace el pull del ACR.
  #
  # Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
  #   AZURE_CLIENT_ID        App (client) ID del App Registration OIDC
  #   AZURE_TENANT_ID        Tenant ID de Azure AD
  #   AZURE_SUBSCRIPTION_ID  Subscription ID de Azure
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-azure:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write   # requerido para el login OIDC
      contents: read

    env:
      ACR_NAME: alpharegistry2026
      ACR_LOGIN_SERVER: alpharegistry2026.azurecr.io
      IMAGE_REPO: eventservice
      WEBAPP_NAME: eventservice-alpha-2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login al ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build y push de la imagen al ACR
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy a la Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:${{ github.sha }}

      - name: Configurar RabbitMQ (publica evento creado para notificaciones push)
        run: |
          RG=$(az webapp list --query "[?name=='${{ env.WEBAPP_NAME }}'].resourceGroup" -o tsv)
          az webapp config appsettings set \
            --name ${{ env.WEBAPP_NAME }} \
            --resource-group "$RG" \
            --settings \
              SPRING_RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" \
              SPRING_RABBITMQ_PORT="5671" \
              SPRING_RABBITMQ_USERNAME="${{ secrets.RABBITMQ_USERNAME }}" \
              SPRING_RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
              SPRING_RABBITMQ_VIRTUAL_HOST="${{ secrets.RABBITMQ_VIRTUAL_HOST }}" \
              SPRING_RABBITMQ_SSL_ENABLED="true"
